services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - chroma_data:/app/chroma_store
    expose:
      - "8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  chroma_data:
