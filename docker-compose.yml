services:
     backend:
       build: ./backend
       env_file:
         - ./backend/.env
       volumes:
         - chroma_data:/app/chroma_store
       ports:
         - "8000:8000"

     frontend:
       build: ./frontend
       ports:
         - "8080:80"
       depends_on:
         - backend

   volumes:
     chroma_data: